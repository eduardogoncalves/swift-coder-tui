name: Pull Request Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    if: github.repository == 'eduardogoncalves/swift-coder-tui'
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Set up Swift 6.3.1
        shell: bash
        run: |
          set -euo pipefail

          swiftly_pkg="$RUNNER_TEMP/swiftly.pkg"
          post_install_script="$RUNNER_TEMP/swiftly-post-install.sh"

          curl --fail --location --silent --show-error \
            https://download.swift.org/swiftly/darwin/swiftly.pkg \
            --output "$swiftly_pkg"
          installer -pkg "$swiftly_pkg" -target CurrentUserHomeDirectory

          export PATH="$HOME/.swiftly/bin:$PATH"

          swiftly init \
            --skip-install \
            --quiet-shell-followup \
            --assume-yes \
            --no-modify-profile

          rm -f "$post_install_script"
          swiftly install \
            --use \
            6.3.1 \
            --assume-yes \
            --post-install-file "$post_install_script"

          if [ -f "$post_install_script" ]; then
            bash "$post_install_script"
          fi

          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          swiftly use --print-location >> "$GITHUB_PATH"

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test
